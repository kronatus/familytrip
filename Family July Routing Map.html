document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

6px;\r\n}\r\n.leaflet-tooltip-bottom:before,\r\n.leaflet-tooltip-top:before {\r\n\tleft: 50%;\r\n\tmargin-left: -6px;\r\n\t}\r\n.leaflet-tooltip-top:before {\r\n\tbottom: 0;\r\n\tmargin-bottom: -12px;\r\n\tborder-top-color: #fff;\r\n\t}\r\n.leaflet-tooltip-bottom:before {\r\n\ttop: 0;\r\n\tmargin-top: -12px;\r\n\tmargin-left: -6px;\r\n\tborder-bottom-color: #fff;\r\n\t}\r\n.leaflet-tooltip-left {\r\n\tmargin-left: -6px;\r\n}\r\n.leaflet-tooltip-right {\r\n\tmargin-left: 6px;\r\n}\r\n.leaflet-tooltip-left:before,\r\n.leaflet-tooltip-right:before {\r\n\ttop: 50%;\r\n\tmargin-top: -6px;\r\n\t}\r\n.leaflet-tooltip-left:before {\r\n\tright: 0;\r\n\tmargin-right: -12px;\r\n\tborder-left-color: #fff;\r\n\t}\r\n.leaflet-tooltip-right:before {\r\n\tleft: 0;\r\n\tmargin-left: -12px;\r\n\tborder-right-color: #fff;\r\n\t}\r\n\r\n/* Printing */\r\n\r\n@media print {\r\n\t/* Prevent printers from removing background-images of controls. */\r\n\t.leaflet-control {\r\n\t\t-webkit-print-color-adjust: exact;\r\n\t\tprint-color-adjust: exact;\r\n\t\t}\r\n\t}\r\n<\u002Fstyle>\n<script src=\"065b8a95-cad7-41d0-add8-440331f31a39\"><\u002Fscript>\n<script src=\"b339498c-bbf5-4f98-a564-1c2ba9df7ea7\"><\u002Fscript>\n<style>\n  html,body{margin:0;background:#0c1330}\n  .leaflet-container{background:#0e1838;font-family:'Space Grotesk',sans-serif;outline:none}\n  .leaflet-popup-content-wrapper{background:linear-gradient(180deg,#131e44,#101a3d);color:#eaf0ff;border:1px solid #2a3a6c;border-radius:13px;box-shadow:0 24px 60px -22px #000}\n  .leaflet-popup-content{margin:13px 15px;line-height:1.4}\n  .leaflet-popup-tip{background:#111b40;border:1px solid #2a3a6c}\n  .leaflet-popup-close-button{color:#6b7caa !important;padding:6px 7px 0 0 !important}\n  .leaflet-popup-close-button:hover{color:#eaf0ff !important}\n  .leaflet-control-zoom a{background:#131e44;color:#9fb0d8;border-color:#22305c}\n  .leaflet-control-zoom a:hover{background:#1a2756;color:#eaf0ff}\n  .leaflet-control-attribution{background:rgba(12,19,48,0.72) !important;color:#5d6e9c !important;font-size:10px}\n  .leaflet-control-attribution a{color:#8493ba !important}\n  .chip-mk{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font:600 12px 'IBM Plex Mono',monospace;color:#0c1330;background:var(--c);box-shadow:0 2px 9px rgba(0,0,0,0.55),0 0 0 2px rgba(12,19,48,0.55);border:1.5px solid rgba(12,19,48,0.35);cursor:pointer;transition:transform .16s ease,box-shadow .16s ease;animation:pop .45s ease both}\n  .chip-mk:hover,.chip-mk.chip-hl{transform:scale(1.28);box-shadow:0 3px 14px var(--c),0 0 0 3px rgba(255,255,255,0.16)}\n  .city-mk{display:flex;flex-direction:column;align-items:center;pointer-events:auto}\n  .city-dot{width:12px;height:12px;border-radius:50%;background:var(--c);box-shadow:0 0 0 4px rgba(12,19,48,0.55),0 0 16px var(--c);animation:pulse 2.6s ease-out infinite}\n  .city-code{margin-top:5px;font:600 12px 'IBM Plex Mono',monospace;color:#eaf0ff;text-shadow:0 1px 5px #000,0 0 10px rgba(0,0,0,0.85);letter-spacing:.05em;white-space:nowrap}\n  @keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}\n  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.16),0 0 14px var(--c)}70%{box-shadow:0 0 0 11px rgba(255,255,255,0),0 0 14px var(--c)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0),0 0 14px var(--c)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:radial-gradient(1200px 600px at 18% -10%, #16224a 0%, transparent 55%),radial-gradient(1000px 700px at 105% 120%, #161f48 0%, transparent 50%),#0c1330;color:#eaf0ff;font-family:'Space Grotesk',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;padding:clamp(14px,3vw,38px)\">\n  <div style=\"max-width:1280px;margin:0 auto\">\n\n    <header style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px\">\n      <div>\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#f5b73e;margin:0 0 9px\">Family Itinerary · July 2026<\u002Fp>\n        <h1 style=\"font-size:clamp(25px,4.2vw,44px);line-height:1.02;margin:0;font-weight:700;letter-spacing:-.015em\">Five airports, one summer<br><span style=\"color:#9fb0d8;font-weight:500\">DFW · BER · TLV · SKG · FRA<\u002Fspan><\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;text-align:right;color:#697aa6;font-size:12px;line-height:1.7;border-left:1px solid #22305c;padding-left:16px\">\n        <div><b style=\"color:#9fb0d8;font-weight:600\">3 travelers<\u002Fb> · Vered, Shy, kids<\u002Fdiv>\n        <div><b style=\"color:#9fb0d8;font-weight:600\">9 legs<\u002Fb> · 7 to book, 2 booked<\u002Fdiv>\n        <div>handoff <b style=\"color:#9fb0d8;font-weight:600\">Tel Aviv<\u002Fb> · vacation <b style=\"color:#9fb0d8;font-weight:600\">Thessaloniki<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n\n      <!-- MAP (emphasized) -->\n      <div style=\"position:relative;background:linear-gradient(180deg,#131e44 0%,#101a3d 100%);border:1px solid #22305c;border-radius:18px;box-shadow:0 28px 70px -34px #000, inset 0 1px 0 rgba(255,255,255,.04);padding:7px\">\n        <div ref=\"{{ mapRef }}\" style=\"height:clamp(440px,66vh,720px);width:100%;border-radius:13px;overflow:hidden;position:relative;z-index:0;background:#0e1838\"><\u002Fdiv>\n        <div style=\"position:absolute;top:18px;left:18px;z-index:1000;pointer-events:none;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#9fb0d8;background:rgba(12,19,48,0.72);border:1px solid #2a3a6c;border-radius:8px;padding:6px 11px;backdrop-filter:blur(4px)\">Hover or tap a number for details<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LEGEND -->\n      <div style=\"background:linear-gradient(180deg,#131e44 0%,#101a3d 100%);border:1px solid #22305c;border-radius:18px;box-shadow:0 28px 70px -40px #000;padding:18px clamp(14px,2vw,22px)\">\n        <h2 style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#697aa6;margin:0 0 14px;font-weight:600\">Legs in order — tap a card to fly there<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px\">\n          <sc-for list=\"{{ legs }}\" as=\"item\" hint-placeholder-count=\"9\">\n            <div onmouseenter=\"{{ item.onEnter }}\" onmouseleave=\"{{ item.onLeave }}\" onclick=\"{{ item.onClick }}\" style=\"display:grid;grid-template-columns:24px 1fr;gap:11px;align-items:start;padding:11px 12px;border:1px solid #22305c;border-radius:12px;background:rgba(255,255,255,0.016);cursor:pointer;transition:background .15s ease,border-color .15s ease\" style-hover=\"background:rgba(255,255,255,0.05);border-color:#3a4a7c\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#0c1330;margin-top:1px;background:{{ item.swatch }}\">{{ item.n }}<\u002Fspan>\n              <div>\n                <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap\">\n                  <span style=\"font:600 14px 'IBM Plex Mono',monospace;color:#eaf0ff\">{{ item.from }} → {{ item.to }}<\u002Fspan>\n                  <span style=\"font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.08em;padding:1px 6px;border-radius:5px;color:{{ item.tagColor }};border:1px solid {{ item.tagBorder }}\">{{ item.status }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font:500 11px 'IBM Plex Mono',monospace;color:#9fb0d8;margin-top:4px;line-height:1.45\">{{ item.date }} · {{ item.who }}<\u002Fdiv>\n                <div style=\"font:400 11px 'IBM Plex Mono',monospace;color:#697aa6;margin-top:2px;line-height:1.4\">{{ item.airline }}<\u002Fdiv>\n                <div style=\"font:600 11.5px 'IBM Plex Mono',monospace;color:#cdd8f5;margin-top:5px\">{{ item.price }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px 20px;border-top:1px solid #22305c;padding-top:14px;margin-top:16px\">\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#9fb0d8\"><span style=\"width:22px;border-top:3px dashed #8493ba;border-radius:3px\"><\u002Fspan>Already booked<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#9fb0d8\"><span style=\"width:22px;border-top:3px solid #f5b73e;border-radius:3px\"><\u002Fspan>Shy · transatlantic + feeders<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:#9fb0d8\"><span style=\"width:22px;border-top:3px solid #36d6c4;border-radius:3px\"><\u002Fspan>Family · Mediterranean legs<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <footer style=\"font-family:'IBM Plex Mono',monospace;color:#697aa6;font-size:11px;margin-top:18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;border-top:1px solid #22305c;padding-top:12px\">\n      <span>Arrowheads show direction of travel · solid = flight · dashed = booked anchor · dotted = ground option (leg 7)<\u002Fspan>\n      <span>Fares marked “est.” are indicative — subject to live availability<\u002Fspan>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900},&quot;mapStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;voyager&quot;,&quot;light&quot;],&quot;default&quot;:&quot;voyager&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showArrows&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  legsData(){\n    return [\n      {n:1,from:'DFW',to:'BER',color:'slate',date:'Jun 22',who:'Vered + 3 kids',airline:'Transatlantic outbound',price:'Booked',status:'BOOKED'},\n      {n:2,from:'BER',to:'TLV',color:'teal',date:'Jul 2 · Thu',who:'Vered + 3 kids',airline:'El Al / Israir · nonstop daytime',price:'est. ≈ $210 / person',status:'BOOK'},\n      {n:3,from:'DFW',to:'FRA',color:'amber',date:'Jul 3',who:'Shy',airline:'American · nonstop ~9.5h',price:'est. ≈ $880 round-trip (with leg 9)',status:'BOOK'},\n      {n:4,from:'FRA',to:'TLV',color:'amber',date:'Jul 3–4',who:'Shy',airline:'El Al · nonstop feeder',price:'est. ≈ $250',status:'BOOK'},\n      {n:5,from:'TLV',to:'SKG',color:'teal',date:'Jul 15',who:'Shy + 3 kids',airline:'El Al 05:15 / Arkia 07:00',price:'est. ≈ $170 / person',status:'BOOK'},\n      {n:6,from:'SKG',to:'BER',color:'teal',date:'Jul 19',who:'Shy + 3 kids',airline:'easyJet / Aegean · nonstop',price:'est. ≈ $115 / person',status:'BOOK'},\n      {n:7,from:'BER',to:'FRA',color:'amber',date:'Jul 20–21',who:'Shy',airline:'ICE train / drive / fly',price:'est. ≈ $90 · ICE train',status:'BOOK'},\n      {n:8,from:'BER',to:'DFW',color:'slate',date:'Jul 21',who:'Vered + 3 kids',airline:'Transatlantic return',price:'Booked',status:'BOOKED'},\n      {n:9,from:'FRA',to:'DFW',color:'amber',date:'Jul 22',who:'Shy',airline:'American · return of DFW↔FRA RT',price:'Incl. in leg 3 round-trip',status:'BOOK'},\n    ];\n  }\n\n  renderVals(){\n    const palette={slate:'#8493ba',amber:'#f5b73e',teal:'#36d6c4'};\n    const legs=this.legsData().map(l=>({\n      ...l,\n      swatch:palette[l.color],\n      tagColor:l.status==='BOOKED'?'#697aa6':'#ff6f6f',\n      tagBorder:l.status==='BOOKED'?'#22305c':'rgba(255,111,111,0.5)',\n      onEnter:()=>this.highlight(l.n),\n      onLeave:()=>this.unhighlight(l.n),\n      onClick:()=>this.openLeg(l.n),\n    }));\n    return { legs, mapRef:(el)=>{ if(el){ this.mapEl=el; } } };\n  }\n\n  componentDidMount(){ this.waitAndInit(); }\n\n  componentDidUpdate(prev){\n    if(!this.map) return;\n    if(prev && prev.mapStyle!==this.props.mapStyle) this.applyTiles();\n    if(prev && prev.showArrows!==this.props.showArrows) this.applyArrows();\n  }\n\n  async waitAndInit(){\n    for(let i=0;i<240;i++){\n      if(window.L && window.L.polylineDecorator && this.mapEl) break;\n      await new Promise(r=>setTimeout(r,50));\n    }\n    if(window.L && this.mapEl) this.initMap();\n  }\n\n  curve(a,b,k){\n    const lat1=a[0],lng1=a[1],lat2=b[0],lng2=b[1];\n    const mlat=(lat1+lat2)/2, mlng=(lng1+lng2)/2;\n    const dlat=lat2-lat1, dlng=lng2-lng1;\n    const clat=mlat - dlng*k, clng=mlng + dlat*k;\n    const pts=[];\n    for(let t=0;t<=1.0001;t+=0.02){\n      const u=1-t;\n      pts.push([u*u*lat1+2*u*t*clat+t*t*lat2, u*u*lng1+2*u*t*clng+t*t*lng2]);\n    }\n    return pts;\n  }\n\n  popRow(k,v){\n    return `<div style=\"display:flex;gap:10px\"><span style=\"flex:0 0 62px;font:500 10px 'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:#697aa6;padding-top:2px\">${k}<\u002Fspan><span style=\"font:500 12.5px 'Space Grotesk',sans-serif;color:#dbe4ff\">${v}<\u002Fspan><\u002Fdiv>`;\n  }\n\n  legPopup(l){\n    const accent=l.status==='BOOKED'?'#697aa6':'#ff6f6f';\n    const col={slate:'#8493ba',amber:'#f5b73e',teal:'#36d6c4'}[l.color];\n    return `<div style=\"font-family:'Space Grotesk',sans-serif;min-width:196px\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px\">\n        <span style=\"width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font:600 11px 'IBM Plex Mono',monospace;color:#0c1330;background:${col}\">${l.n}<\u002Fspan>\n        <span style=\"font:600 16px 'IBM Plex Mono',monospace;color:#eaf0ff\">${l.from} → ${l.to}<\u002Fspan>\n        <span style=\"margin-left:auto;font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.08em;padding:2px 7px;border-radius:5px;color:${accent};border:1px solid ${accent}\">${l.status}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        ${this.popRow('Date',l.date)}\n        ${this.popRow('Travelers',l.who)}\n        ${this.popRow('Routing',l.airline)}\n        ${this.popRow('Fare',l.price)}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }\n\n  applyTiles(){\n    const L=window.L; const map=this.map; if(!map) return;\n    const style=this.props.mapStyle||'dark';\n    const urls={dark:'dark_all',light:'light_all',voyager:'rastertiles/voyager'};\n    const path=urls[style]||'dark_all';\n    if(this.tileLayer) map.removeLayer(this.tileLayer);\n    this.tileLayer=L.tileLayer(`https://{s}.basemaps.cartocdn.com/${path}/{z}/{x}/{y}{r}.png`,{subdomains:'abcd',maxZoom:19,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);\n    if(this.tileLayer.bringToBack) this.tileLayer.bringToBack();\n  }\n\n  applyArrows(){\n    const L=window.L; if(!this.map || !L.polylineDecorator) return;\n    const on=this.props.showArrows!==false;\n    Object.values(this.legObjs||{}).forEach(o=>{\n      if(o.deco){ this.map.removeLayer(o.deco); o.deco=null; }\n      if(on){\n        o.deco=L.polylineDecorator(o.line,{patterns:[{offset:'80%',repeat:0,symbol:L.Symbol.arrowHead({pixelSize:12,headAngle:55,polygon:true,pathOptions:{stroke:false,fillOpacity:0.95,fillColor:o.col,color:o.col}})}]}).addTo(this.map);\n      }\n    });\n  }\n\n  initMap(){\n    if(this._inited) return;\n    this._inited=true;\n    const L=window.L;\n    const cities={\n      DFW:{ll:[32.90,-97.04],name:'Dallas / Fort Worth',role:'Home base',c:'#eaf0ff'},\n      FRA:{ll:[50.04,8.56],name:'Frankfurt',role:'Shy · European hub',c:'#f5b73e'},\n      BER:{ll:[52.37,13.50],name:'Berlin',role:'Family reunion',c:'#eaf0ff'},\n      SKG:{ll:[40.52,22.97],name:'Thessaloniki',role:'Greek vacation',c:'#36d6c4'},\n      TLV:{ll:[32.01,34.88],name:'Tel Aviv',role:'Israel handoff',c:'#eaf0ff'},\n    };\n    this.cities=cities;\n    const map=L.map(this.mapEl,{zoomControl:true,scrollWheelZoom:false,attributionControl:true,minZoom:2});\n    this.map=map;\n    this.applyTiles();\n\n    const palette={slate:'#8493ba',amber:'#f5b73e',teal:'#36d6c4'};\n    const bends={1:-0.16,2:0.18,3:-0.22,4:-0.10,5:0.22,6:-0.16,7:0.26,8:0.20,9:0.10};\n    const dashes={1:'4 7',7:'1 7',8:'4 7'};\n    const legs=this.legsData();\n    this.legObjs={};\n    const allPts=[];\n\n    legs.forEach(l=>{\n      const a=cities[l.from].ll, b=cities[l.to].ll;\n      const pts=this.curve(a,b,bends[l.n]);\n      allPts.push(...pts);\n      const col=palette[l.color];\n      const line=L.polyline(pts,{color:col,weight:l.status==='BOOKED'?2.4:3,opacity:0.9,dashArray:dashes[l.n]||null,lineCap:'round'}).addTo(map);\n      line.baseWeight=l.status==='BOOKED'?2.4:3;\n      const mid=pts[Math.floor(pts.length/2)];\n      const chip=L.marker(mid,{icon:L.divIcon({className:'',html:`<div class=\"chip-mk\" style=\"--c:${col}\">${l.n}<\u002Fdiv>`,iconSize:[30,30],iconAnchor:[15,15]}),riseOnHover:true,zIndexOffset:600}).addTo(map);\n      const pop=this.legPopup(l);\n      line.bindPopup(pop,{className:'leg-pop',maxWidth:280});\n      chip.bindPopup(pop,{className:'leg-pop',maxWidth:280});\n      chip.on('mouseover',()=>chip.openPopup());\n      line.on('mouseover',()=>line.setStyle({weight:line.baseWeight+2,opacity:1}));\n      line.on('mouseout',()=>line.setStyle({weight:line.baseWeight,opacity:0.9}));\n      this.legObjs[l.n]={line,chip,mid,col};\n    });\n\n    this.applyArrows();\n\n    Object.entries(cities).forEach(([code,c])=>{\n      const m=L.marker(c.ll,{icon:L.divIcon({className:'',html:`<div class=\"city-mk\"><span class=\"city-dot\" style=\"--c:${c.c}\"><\u002Fspan><span class=\"city-code\">${code}<\u002Fspan><\u002Fdiv>`,iconSize:[64,46],iconAnchor:[32,7]}),zIndexOffset:1000}).addTo(map);\n      m.bindPopup(`<div style=\"font-family:'Space Grotesk',sans-serif\"><div style=\"font:600 15px 'IBM Plex Mono',monospace;color:#eaf0ff\">${code} · ${c.name}<\u002Fdiv><div style=\"font:500 12px 'IBM Plex Mono',monospace;color:#9fb0d8;margin-top:4px\">${c.role}<\u002Fdiv><\u002Fdiv>`,{className:'leg-pop',maxWidth:240});\n    });\n\n    const bounds=L.latLngBounds(allPts);\n    this._bounds=bounds;\n    map.fitBounds(bounds,{padding:[55,55]});\n    setTimeout(()=>{ map.invalidateSize(); map.fitBounds(bounds,{padding:[55,55]}); },280);\n    this._onResize=()=>{ map.invalidateSize(); if(this._bounds) map.fitBounds(this._bounds,{padding:[55,55]}); };\n    window.addEventListener('resize',this._onResize);\n  }\n\n  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize',this._onResize); }\n\n  highlight(n){\n    const o=this.legObjs&&this.legObjs[n]; if(!o) return;\n    o.line.setStyle({weight:o.line.baseWeight+2,opacity:1});\n    o.line.bringToFront();\n    if(o.chip._icon&&o.chip._icon.firstChild) o.chip._icon.firstChild.classList.add('chip-hl');\n  }\n  unhighlight(n){\n    const o=this.legObjs&&this.legObjs[n]; if(!o) return;\n    o.line.setStyle({weight:o.line.baseWeight,opacity:0.9});\n    if(o.chip._icon&&o.chip._icon.firstChild) o.chip._icon.firstChild.classList.remove('chip-hl');\n  }\n  openLeg(n){\n    const o=this.legObjs&&this.legObjs[n]; if(!o||!this.map) return;\n    this.map.panTo(o.mid,{animate:true});\n    o.chip.openPopup();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
